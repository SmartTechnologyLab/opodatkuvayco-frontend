name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci.yml
    with:
      node_version: "20.13.1"

  build:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Run common steps for build
        uses: ..github/actions/common-steps
        with:
          node_version: "20.13.1"
      - name: Build project
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-artifact
          path: ./dist

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Run common steps for deploy
        uses: ./.github/actions/common-steps
        with:
          node_version: "20.13.1"
      - name: Download build artifact
        uses: actions/download-artifact@v3
        with:
          name: build-artifact
          path: ./dist
      - name: rsync deploy project
        uses: burnett01/rsync-deployments@5.2.1
        with:
          switches: -avzr --delete
          path: ./dist
          remote_host: ${{ secrets.DEV_REMOTE_HOST }}
          remote_user: ${{ secrets.DEV_REMOTE_USER }}
          remote_key: ${{ secrets.DEV_REMOTE_KEY }}
          remote_path: ${{ secrets.PROD_REMOTE_PATH }}

  release:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Run common steps for release
        uses: ./.github/actions/common-steps
        with:
          node_version: "20.13.1"
      - name: Run Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run release
