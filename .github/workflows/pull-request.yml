name: PullRequest
on:
  pull_request:
    branches:
      - development
      - main

permissions:
  contents: read # for checkout


x-checkout: &checkout
  name: Checkout
  uses: actions/checkout@v4

x-cache: &cache
  name: Cache dependencies
  uses: actions/cache@v4
  with:
    path: ~/.npm
    key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
    restore-keys: |
      ${{ runner.os }}-node-

x-install: &install
  name: Install dependencies
  run: npm ci

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - <<: *checkout
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.13.1"
      - <<: *cache
      - <<: *install


  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - <<: *checkout
      - <<: *cache
      - <<: *install
      - name: Linter
        run: npx lint-staged

  type_check:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - <<: *checkout
      - <<: *cache
      - <<: *install
      - name: Type check
        run: npm run type-check

  unit_tests:
    needs: [lint, type_check]
    runs-on: ubuntu-latest
    steps:
      - <<: *checkout
      - <<: *cache
      - <<: *install
      - name: Unit tests
        run: npm run test

  build:
    needs: [ unit_tests ]
    runs-on: ubuntu-latest
    steps:
      - <<: *checkout
      - <<: *cache
      - <<: *install
      - name: Build project
        run: npm run build
      - name: Build storybook
        run: npm run build-storybook